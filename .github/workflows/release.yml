name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: macos-26
    env:
      VERSION: ${{ inputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Create and push tag
        run: |
          git tag "$VERSION"
          git push origin "$VERSION"

      - name: Build .app
        run: |
          xcodebuild -scheme CCXcodeConnect \
            -configuration Release \
            -derivedDataPath .build/xcode \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Ad-hoc codesign and zip .app
        run: |
          APP_PATH=$(find .build/xcode -name 'CCXcodeConnect.app' -path '*/Release/*' | head -1)
          codesign --force --deep --sign - "$APP_PATH"
          cd "$(dirname "$APP_PATH")"
          zip -r -y "$GITHUB_WORKSPACE/CCXcodeConnect-${{ inputs.version }}-macos.zip" CCXcodeConnect.app

      - name: Build CLI
        run: swift build -c release

      - name: Package CLI binary
        run: |
          cp .build/release/cc-xcode-connect cc-xcode-connect
          codesign --force --sign - cc-xcode-connect
          tar czf "cc-xcode-connect-${{ inputs.version }}-macos.tar.gz" cc-xcode-connect

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          generate_release_notes: true
          files: |
            CCXcodeConnect-${{ inputs.version }}-macos.zip
            cc-xcode-connect-${{ inputs.version }}-macos.tar.gz

  update-tap:
    name: Update Homebrew Tap
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Update cask version and sha256
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          curl -sL "https://github.com/${{ github.repository }}/releases/download/${VERSION}/CCXcodeConnect-${VERSION}-macos.zip" -o app.zip
          SHA=$(shasum -a 256 app.zip | awk '{print $1}')
          echo "SHA256: $SHA"

          git clone "https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/${{ github.repository_owner }}/homebrew-tap.git"
          cd homebrew-tap

          sed -i "s/version \".*\"/version \"${VERSION}\"/" Casks/cc-xcode-connect.rb
          sed -i "s/sha256 \".*\"/sha256 \"${SHA}\"/" Casks/cc-xcode-connect.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/cc-xcode-connect.rb
          git commit -m "Update cc-xcode-connect to ${VERSION}"
          git push
